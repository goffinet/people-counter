services:
  app:
    build:
      context: .
      network: host
    image: people-counter-app:latest
    runtime: nvidia
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - YOLO_CONFIG_DIR=/data/ultralytics
      - YOLO_AUTOINSTALL=false
    ports:
      - "8080:8080"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./app:/app
      - data:/data
    command: python /app/main.py
    restart: unless-stopped

  dashboard:
    image: grafana/grafana:10.4.8
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=frser-sqlite-datasource
      # --- SMTP (décommenter et adapter pour les alertes email) ---
      # - GF_SMTP_ENABLED=true
      # - GF_SMTP_HOST=smtp.votreserveur.com:587
      # - GF_SMTP_USER=alerte@votredomaine.com
      # - GF_SMTP_PASSWORD=motdepasse
      # - GF_SMTP_FROM_ADDRESS=alerte@votredomaine.com
      # - GF_SMTP_FROM_NAME=Grafana PE1103N
    volumes:
      - data:/data:ro
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
      - ./grafana/plugins:/var/lib/grafana/plugins
    restart: unless-stopped

volumes:
  data:
  grafana_data:
