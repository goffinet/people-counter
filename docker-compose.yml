services:

  # ---------------------------------------------------------------------------
  # Stack YOLO — YOLOv8n + ByteTrack (Ultralytics)
  # Démarrer : docker compose --profile yolo up -d
  # ---------------------------------------------------------------------------
  app-yolo:
    profiles: [yolo]
    build:
      context: .
      network: host
    image: people-counter-app:latest
    runtime: nvidia
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - YOLO_CONFIG_DIR=/data/ultralytics
      - YOLO_AUTOINSTALL=false
    ports:
      - "8080:8080"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./app:/app
      - data:/data
    command: python /app/main.py
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Stack DeepStream — PeopleNet v2.6 + NvDCF (DeepStream 7)
  # Démarrer : docker compose --profile deepstream up -d
  # ---------------------------------------------------------------------------
  app-deepstream:
    profiles: [deepstream]
    image: nvcr.io/nvidia/deepstream:9.0-samples-multiarch
    runtime: nvidia
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./app:/app
      - data:/data
    command: python3 /app/deepstream_main.py
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Dashboard Grafana — commun aux deux stacks
  # ---------------------------------------------------------------------------
  dashboard:
    profiles: [yolo, deepstream]
    image: grafana/grafana:10.4.8
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=frser-sqlite-datasource
      - GF_PATHS_PLUGINS=/grafana-plugins
      # --- SMTP (décommenter et adapter pour les alertes email) ---
      # - GF_SMTP_ENABLED=true
      # - GF_SMTP_HOST=smtp.votreserveur.com:587
      # - GF_SMTP_USER=alerte@votredomaine.com
      # - GF_SMTP_PASSWORD=motdepasse
      # - GF_SMTP_FROM_ADDRESS=alerte@votredomaine.com
      # - GF_SMTP_FROM_NAME=Grafana PE1103N
    volumes:
      - data:/data:ro
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
      - ./grafana/plugins:/grafana-plugins
    restart: unless-stopped

volumes:
  data:
  grafana_data:
