services:
  app:
    # Image fournie par la branche feature mergée (feature/yolo ou feature/nanoowl).
    # Ne pas démarrer directement depuis main — merger d'abord une branche feature.
    image: ${APP_IMAGE:-people-counter:not-set}
    runtime: nvidia
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./app:/app
      - data:/data
    command: python /app/main.py
    restart: unless-stopped

  dashboard:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://0.0.0.0:3000
      # --- SMTP (décommenter et adapter pour les alertes email) ---
      # - GF_SMTP_ENABLED=true
      # - GF_SMTP_HOST=smtp.votreserveur.com:587
      # - GF_SMTP_USER=alerte@votredomaine.com
      # - GF_SMTP_PASSWORD=motdepasse
      # - GF_SMTP_FROM_ADDRESS=alerte@votredomaine.com
      # - GF_SMTP_FROM_NAME=Grafana PE1103N
    volumes:
      - data:/data:ro
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  data:
  grafana_data:
